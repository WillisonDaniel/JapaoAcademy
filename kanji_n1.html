<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de Kanji N1 - Japão Academy</title>

    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1b4b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+JP:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/wanakana@5.3.1/wanakana.min.js"></script>
</head>

<body data-mode="kanji_n1">
    <header>
        <a href="kanji.html" class="home-btn">⬅ Voltar ao Hub de Kanjis</a>
        <button class="theme-btn" onclick="toggleTheme()" title="Alternar Tema">🌙</button>
        <h1 id="mainTitle">Curso de Kanji N1</h1>
        <p id="mainDesc">Maestria total nos 2.136 Jōyō Kanjis com leitura temática erudita e Keigo avançado.</p>
    </header>

    <div class="container">
        <!-- BANNER DE REVISÃO SRS DE KANJI N1 -->
        <div class="banner-srs" style="border-color: rgba(180, 83, 9, 0.4);">
            <div class="srs-banner-info">
                <span class="srs-badge-tag"
                    style="background: rgba(180, 83, 9, 0.2); color: #f59e0b; border-color: #b45309;">🏯 REPETIÇÃO
                    ESPAÇADA (Kanji N1)</span>
                <h3>Revisão Inteligente da Memória</h3>
                <p id="srs-banner-desc">Carregando itens pendentes de revisão...</p>
                <div class="srs-modos-filtro">
                    <button class="btn-srs-tab active" id="tab-srs-todos" onclick="selecionarModoSRS('todos', 'kanji_n1')">🟢 Pendentes</button>
                    <button class="btn-srs-tab" id="tab-srs-favoritos" onclick="selecionarModoSRS('favoritos', 'kanji_n1')">⭐ Favoritos</button>
                    <button class="btn-srs-tab" id="tab-srs-erros" onclick="selecionarModoSRS('erros', 'kanji_n1')">❌ Caderno de Erros</button>
                </div>
            </div>
            <div class="srs-banner-action">
                <div class="srs-badge-box">
                    <span class="srs-counter-badge" id="srs-badge-count">0</span>
                    <small>pendentes</small>
                </div>
                <button id="btn-iniciar-srs" onclick="iniciarSessaoSRS('kanji_n1')" class="btn-srs-action"
                    style="background: linear-gradient(135deg, #b45309, #d97706);">
                    Iniciar Revisão ➔
                </button>
            </div>
        </div>

        <div id="study-area" style="display: block;">
            <div class="tabs" id="tabContainer"></div>
            <main id="moduleDisplay" class="module-content"></main>
        </div>

        <!-- PLAYER DE REPETIÇÃO ESPAÇADA (SRS) -->
        <main id="player-srs" style="display: none;">
            <div class="barra-progresso">
                <span id="srs-etapa-titulo">Revisão SRS (1 de 1)</span>
                <button onclick="fecharSessaoSRS()">✖ Sair da Revisão</button>
            </div>

            <div id="conteudo-card-srs" class="srs-container-flex"></div>

            <div class="srs-botoes-acao">
                <button id="btn-revelar-srs" onclick="revelarRespostaSRS()" class="btn-srs-reveal">
                    Ver Resposta 👁️
                </button>

                <div id="painel-avaliacao-srs" class="grid-avaliacao-srs" style="display: none;">
                    <button onclick="processarAvaliacaoSRS(1)" class="btn-srs-again">
                        ❌ Errei
                        <small>Revisar amanhã</small>
                    </button>
                    <button onclick="processarAvaliacaoSRS(2)" class="btn-srs-hard">
                        🟡 Difícil
                        <small>Aumento leve</small>
                    </button>
                    <button onclick="processarAvaliacaoSRS(3)" class="btn-srs-good">
                        🟢 Bom
                        <small>Intervalo médio</small>
                    </button>
                    <button onclick="processarAvaliacaoSRS(4)" class="btn-srs-easy">
                        🌟 Fácil
                        <small>Intervalo longo</small>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Puxa os dados exclusivos do Kanji N1 e o script motor -->
    <script src="data_kanji_n1.js"></script>
    <script type="module" src="firebase-init.js"></script>
    <script src="app.js"></script>
</body>

</html>
