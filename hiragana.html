<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso de Hiragana - Japão Academy</title>

    <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e1b4b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link
        href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Noto+Sans+JP:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/wanakana@5.3.1/wanakana.min.js"></script>
</head>

<body data-mode="hiragana">
    <header>
        <a href="index.html" class="home-btn">⬅ Menu Inicial</a>
        <button class="theme-btn" onclick="toggleTheme()" title="Alternar Tema">🌙</button>
        <h1 id="mainTitle">Curso de Hiragana</h1>
        <p id="mainDesc">O alfabeto base (Teoria, Vocabulário e Prática Completa).</p>
    </header>

    <div class="container">
        <!-- BANNER DE REVISÃO SRS DE HIRAGANA -->
        <div class="banner-srs" style="border-color: rgba(217, 4, 41, 0.4);">
            <div class="srs-banner-info">
                <span class="srs-badge-tag"
                    style="background: rgba(217, 4, 41, 0.2); color: #ff4d6d; border-color: #d90429;">🔴 REPETIÇÃO
                    ESPAÇADA (HIRAGANA)</span>
                <h3>Revisão Inteligente da Memória</h3>
                <p id="srs-banner-desc">Carregando itens pendentes de revisão...</p>
            </div>
            <div class="srs-banner-action">
                <div class="srs-badge-box">
                    <span class="srs-counter-badge" id="srs-badge-count">0</span>
                    <small>pendentes</small>
                </div>
                <button id="btn-iniciar-srs" onclick="iniciarSessaoSRS('hiragana')" class="btn-srs-action"
                    style="background: linear-gradient(135deg, #d90429, #ef233c);">
                    Iniciar Revisão ➔
                </button>
            </div>
        </div>

        <div id="study-area" style="display: block;">
            <div class="tabs" id="tabContainer"></div>
            <main id="moduleDisplay" class="module-content"></main>
        </div>

        <!-- PLAYER DE REPETIÇÃO ESPAÇADA (SRS) -->
        <main id="player-srs" style="display: none;">
            <div class="barra-progresso">
                <span id="srs-etapa-titulo">Revisão SRS (1 de 1)</span>
                <button onclick="fecharSessaoSRS()">✖ Sair da Revisão</button>
            </div>

            <div id="conteudo-card-srs" class="srs-container-flex"></div>

            <div class="srs-botoes-acao">
                <button id="btn-revelar-srs" onclick="revelarRespostaSRS()" class="btn-srs-reveal">
                    Ver Resposta 👁️
                </button>

                <div id="painel-avaliacao-srs" class="grid-avaliacao-srs" style="display: none;">
                    <button onclick="processarAvaliacaoSRS(1)" class="btn-srs-again">
                        ❌ Errei
                        <small>Revisar amanhã</small>
                    </button>
                    <button onclick="processarAvaliacaoSRS(2)" class="btn-srs-hard">
                        🟡 Difícil
                        <small>Aumento leve</small>
                    </button>
                    <button onclick="processarAvaliacaoSRS(3)" class="btn-srs-good">
                        🟢 Bom
                        <small>Intervalo médio</small>
                    </button>
                    <button onclick="processarAvaliacaoSRS(4)" class="btn-srs-easy">
                        🌟 Fácil
                        <small>Intervalo longo</small>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="data_hiragana.js"></script>
    <script type="module" src="firebase-init.js"></script>
    <script src="app.js"></script>
</body>

</html>
